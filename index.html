<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&family=Arvo:ital,wght@0,400;0,700;1,400;1,700&family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="container">
    <div class="left">
      <h3>Your Result</h3>
      <div class="circle">
        <h1>76</h1>
        <p>of 100</p>
      </div>
      <h4>Great</h4>
      <p class="desc">You scored higher than 65% of <br>the people who have taken<br>these tests.</p>
    </div>

    <div class="right">
      <div class="top">
        <h3>Summary</h3>
      <div class="sense sense-red">
        <div class="sense-left">
          <img src="./images/icon-reaction.svg">
          <span class="icon-name">Reaction</span>
        </div>

        <span class="grade"><strong>80</strong>
        <span class="hundred">/ 100</span>
        </span>
      </div>
      <div class="sense sense-yellow">
        <div class="sense-left">
          <img src="./images/icon-memory.svg">
          <span class="icon-name">Memory</span>
        </div>

        <span class="grade"><strong>92</strong>
        <span class="hundred">/ 100</span>
        </span>
      </div>
      <div class="sense sense-green">
        <div class="sense-left">
          <img src="./images/icon-verbal.svg">
          <span class="icon-name">Verbal</span>
        </div>

        <span class="grade"><strong>61</strong> 
        <span class="hundred">/ 100</span>
        </span>
      </div>
      <div class="sense sense-blue">
        <div class="sense-left">
          <img src="./images/icon-visual.svg">
          <span class="icon-name">Visual</span>
        </div>
        
        <span class="grade"><strong>73</strong>
          <span class="hundred">/ 100</span> 
          </span>
      </div>
      </div>
      

      <button>Continue</button>
    </div>
  </div>
</body>
</html>
